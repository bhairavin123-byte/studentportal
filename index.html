<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>

  <!-- Google Analytics Tag - Replace G-XXXXXXXXXX with your Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-9ENFS57CYK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-9ENFS57CYK');
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: #111827;
      --surface2: #1a2235;
      --accent: #4fffb0;
      --accent2: #00b4ff;
      --danger: #ff4f6a;
      --text: #e8edf5;
      --muted: #6b7a99;
      --border: rgba(255,255,255,0.07);
      --glow: 0 0 30px rgba(79,255,176,0.15);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,255,176,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,255,176,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    .blob1 { width: 500px; height: 500px; background: #4fffb0; top: -150px; right: -100px; animation: drift 12s ease-in-out infinite alternate; }
    .blob2 { width: 400px; height: 400px; background: #00b4ff; bottom: -100px; left: -80px; animation: drift 15s ease-in-out infinite alternate-reverse; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px, 30px) scale(1.1); } }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.7s ease both;
    }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(79,255,176,0.08);
      border: 1px solid rgba(79,255,176,0.2);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .logo-badge::before { content: '●'; font-size: 8px; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.15;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 300;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 6px;
      margin-bottom: 36px;
      width: fit-content;
      animation: fadeUp 0.6s 0.2s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .tab-btn {
      padding: 10px 28px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0a0f1e;
      box-shadow: 0 4px 20px rgba(79,255,176,0.25);
    }

    /* PANELS */
    .panel { display: none; animation: fadeUp 0.4s ease both; }
    .panel.active { display: block; }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
    }

    /* FORM */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    label span { color: var(--danger); margin-left: 2px; }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(79,255,176,0.5);
      box-shadow: 0 0 0 3px rgba(79,255,176,0.08);
    }
    select option { background: var(--surface2); }
    textarea { resize: vertical; min-height: 80px; }
    input::placeholder { color: var(--muted); }

    /* BUTTON */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #00e58a);
      color: #0a0f1e;
      box-shadow: 0 4px 20px rgba(79,255,176,0.2);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(79,255,176,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .btn-danger { background: rgba(255,79,106,0.15); color: var(--danger); border: 1px solid rgba(255,79,106,0.3); }
    .btn-danger:hover { background: rgba(255,79,106,0.25); }

    .form-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 28px;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent);
      color: #0a0f1e;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 12px 28px;
      border-radius: 100px;
      z-index: 999;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* SEARCH */
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }
    .search-bar input {
      flex: 1;
      padding: 14px 20px;
      font-size: 1rem;
    }
    .search-bar select { min-width: 160px; }

    /* TABLE */
    .table-wrap { overflow-x: auto; border-radius: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    thead tr { background: var(--surface2); }
    th {
      padding: 14px 18px;
      text-align: left;
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    td { padding: 14px 18px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-cse  { background: rgba(79,255,176,0.12); color: var(--accent); }
    .badge-ece  { background: rgba(0,180,255,0.12); color: var(--accent2); }
    .badge-mech { background: rgba(255,179,71,0.12); color: #ffb347; }
    .badge-civil{ background: rgba(200,120,255,0.12); color: #c878ff; }
    .badge-eee  { background: rgba(255,79,106,0.12); color: var(--danger); }
    .badge-it   { background: rgba(100,200,120,0.12); color: #64c878; }

    .action-btns { display: flex; gap: 8px; }
    .action-btns button {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .edit-btn { background: rgba(0,180,255,0.12); color: var(--accent2); }
    .edit-btn:hover { background: rgba(0,180,255,0.22); }
    .del-btn { background: rgba(255,79,106,0.10); color: var(--danger); }
    .del-btn:hover { background: rgba(255,79,106,0.22); }

    .empty-state {
      text-align: center;
      padding: 64px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 1rem; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
    }
    .stat-card .val {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-card .lbl { font-size: 0.75rem; color: var(--muted); font-weight: 500; margin-top: 2px; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .results-header span { font-size: 0.85rem; color: var(--muted); }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .card { padding: 24px 18px; }
      .search-bar { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div id="toast">✓ Student registered successfully!</div>

<div class="container">

  <header>
    <div class="logo-badge">Live Portal</div>
    <h1>Student Registration Portal</h1>
    <p class="subtitle">Register students and search records — fully local, no server needed</p>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('register', this)">＋ Register</button>
    <button class="tab-btn" onclick="switchTab('search', this)">⌕ Search</button>
  </div>

  <!-- REGISTER PANEL -->
  <div id="panel-register" class="panel active">
    <div class="card">
      <div class="form-grid" id="studentForm">

        <div class="form-group">
          <label>First Name <span>*</span></label>
          <input type="text" id="firstName" placeholder="e.g. Rohan" />
        </div>
        <div class="form-group">
          <label>Last Name <span>*</span></label>
          <input type="text" id="lastName" placeholder="e.g. Sharma" />
        </div>

        <div class="form-group">
          <label>Roll Number <span>*</span></label>
          <input type="text" id="rollNo" placeholder="e.g. 22CS001" />
        </div>
        <div class="form-group">
          <label>Email Address <span>*</span></label>
          <input type="email" id="email" placeholder="student@college.edu" />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210" />
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" id="dob" />
        </div>

        <div class="form-group">
          <label>Department <span>*</span></label>
          <select id="dept">
            <option value="">— Select Department —</option>
            <option value="CSE">Computer Science (CSE)</option>
            <option value="ECE">Electronics & Communication (ECE)</option>
            <option value="MECH">Mechanical Engineering (MECH)</option>
            <option value="CIVIL">Civil Engineering (CIVIL)</option>
            <option value="EEE">Electrical Engineering (EEE)</option>
            <option value="IT">Information Technology (IT)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year of Study <span>*</span></label>
          <select id="year">
            <option value="">— Select Year —</option>
            <option value="1">1st Year</option>
            <option value="2">2nd Year</option>
            <option value="3">3rd Year</option>
            <option value="4">4th Year</option>
          </select>
        </div>

        <div class="form-group">
          <label>Section</label>
          <select id="section">
            <option value="">— Select —</option>
            <option>A</option><option>B</option><option>C</option><option>D</option>
          </select>
        </div>
        <div class="form-group">
          <label>CGPA</label>
          <input type="number" id="cgpa" step="0.01" min="0" max="10" placeholder="e.g. 8.75" />
        </div>

        <div class="form-group full">
          <label>Address</label>
          <textarea id="address" placeholder="Full address..."></textarea>
        </div>

      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="registerStudent()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>
          Register Student
        </button>
        <button class="btn btn-danger" onclick="clearForm()">Clear Form</button>
      </div>
    </div>
  </div>

  <!-- SEARCH PANEL -->
  <div id="panel-search" class="panel">

    <div class="stats-row" id="statsRow"></div>

    <div class="card">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by name, roll no, email…" oninput="renderTable()" />
        <select id="filterDept" onchange="renderTable()">
          <option value="">All Departments</option>
          <option value="CSE">CSE</option>
          <option value="ECE">ECE</option>
          <option value="MECH">MECH</option>
          <option value="CIVIL">CIVIL</option>
          <option value="EEE">EEE</option>
          <option value="IT">IT</option>
        </select>
        <select id="filterYear" onchange="renderTable()">
          <option value="">All Years</option>
          <option value="1">Year 1</option>
          <option value="2">Year 2</option>
          <option value="3">Year 3</option>
          <option value="4">Year 4</option>
        </select>
      </div>

      <div class="results-header">
        <span id="resultsCount">Showing 0 students</span>
        <button class="btn btn-primary" style="padding:8px 18px;font-size:0.8rem" onclick="exportCSV()">↓ Export CSV</button>
      </div>

      <div class="table-wrap">
        <table id="studentTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Roll No.</th>
              <th>Department</th>
              <th>Year</th>
              <th>Email</th>
              <th>CGPA</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none">
          <div class="icon">🔍</div>
          <p>No students found. Register some students first!</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  /* ── Data Store ── */
  let students = JSON.parse(localStorage.getItem('students') || '[]');
  let editId = null;

  function save() {
    localStorage.setItem('students', JSON.stringify(students));
  }

  /* ── Tab Switch ── */
  function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    if (tab === 'search') { renderStats(); renderTable(); }

    // GA Event
    gtag('event', 'tab_switch', { tab_name: tab });
  }

  /* ── Register ── */
  function registerStudent() {
    const firstName = document.getElementById('firstName').value.trim();
    const lastName  = document.getElementById('lastName').value.trim();
    const rollNo    = document.getElementById('rollNo').value.trim();
    const email     = document.getElementById('email').value.trim();
    const dept      = document.getElementById('dept').value;
    const year      = document.getElementById('year').value;

    if (!firstName || !lastName || !rollNo || !email || !dept || !year) {
      showToast('⚠ Please fill all required fields!', '#ff4f6a');
      return;
    }

    if (!editId && students.find(s => s.rollNo === rollNo)) {
      showToast('⚠ Roll number already exists!', '#ff4f6a');
      return;
    }

    const student = {
      id: editId || Date.now().toString(),
      firstName, lastName,
      rollNo, email,
      phone:   document.getElementById('phone').value.trim(),
      dob:     document.getElementById('dob').value,
      dept, year,
      section: document.getElementById('section').value,
      cgpa:    document.getElementById('cgpa').value,
      address: document.getElementById('address').value.trim(),
      createdAt: editId ? (students.find(s=>s.id===editId)?.createdAt || new Date().toISOString()) : new Date().toISOString()
    };

    if (editId) {
      const idx = students.findIndex(s => s.id === editId);
      students[idx] = student;
      editId = null;
      showToast('✏ Student updated!', '#00b4ff');
      // GA
      gtag('event', 'student_updated', { roll_no: student.rollNo, department: student.dept });
    } else {
      students.push(student);
      showToast('✓ Student registered!', '#4fffb0');
      // GA
      gtag('event', 'student_registered', { roll_no: student.rollNo, department: student.dept, year: student.year });
    }

    save();
    clearForm();
  }

  function clearForm() {
    ['firstName','lastName','rollNo','email','phone','dob','dept','year','section','cgpa','address'].forEach(id => {
      const el = document.getElementById(id);
      el.value = '';
    });
    editId = null;
    document.querySelector('.btn-primary').textContent = '✓ Register Student';
  }

  /* ── Edit ── */
  function editStudent(id) {
    const s = students.find(st => st.id === id);
    if (!s) return;
    editId = id;
    document.getElementById('firstName').value = s.firstName;
    document.getElementById('lastName').value  = s.lastName;
    document.getElementById('rollNo').value    = s.rollNo;
    document.getElementById('email').value     = s.email;
    document.getElementById('phone').value     = s.phone || '';
    document.getElementById('dob').value       = s.dob || '';
    document.getElementById('dept').value      = s.dept;
    document.getElementById('year').value      = s.year;
    document.getElementById('section').value   = s.section || '';
    document.getElementById('cgpa').value      = s.cgpa || '';
    document.getElementById('address').value   = s.address || '';

    switchTab('register', document.querySelectorAll('.tab-btn')[0]);
    document.querySelector('.btn-primary').innerHTML = '✏ Update Student';
    window.scrollTo({ top: 0, behavior: 'smooth' });

    gtag('event', 'edit_initiated', { roll_no: s.rollNo });
  }

  /* ── Delete ── */
  function deleteStudent(id) {
    const s = students.find(st => st.id === id);
    if (!confirm(`Delete ${s?.firstName} ${s?.lastName}?`)) return;
    students = students.filter(st => st.id !== id);
    save();
    renderStats();
    renderTable();
    showToast('🗑 Student deleted', '#ff4f6a');
    gtag('event', 'student_deleted', { roll_no: s?.rollNo });
  }

  /* ── Render Stats ── */
  function renderStats() {
    const total = students.length;
    const depts = [...new Set(students.map(s => s.dept))].length;
    const avgCgpa = students.filter(s=>s.cgpa).length
      ? (students.filter(s=>s.cgpa).reduce((a,s)=>a+parseFloat(s.cgpa||0),0)/students.filter(s=>s.cgpa).length).toFixed(2)
      : '—';
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="val">${total}</div><div class="lbl">Total Students</div></div>
      <div class="stat-card"><div class="val">${depts}</div><div class="lbl">Departments</div></div>
      <div class="stat-card"><div class="val">${avgCgpa}</div><div class="lbl">Avg CGPA</div></div>
      <div class="stat-card"><div class="val">${students.filter(s=>s.year==='1').length}</div><div class="lbl">1st Year</div></div>
    `;
  }

  /* ── Render Table ── */
  function renderTable() {
    const q     = document.getElementById('searchInput').value.toLowerCase();
    const dept  = document.getElementById('filterDept').value;
    const year  = document.getElementById('filterYear').value;

    let filtered = students.filter(s => {
      const nameMatch = (s.firstName+' '+s.lastName).toLowerCase().includes(q)
        || s.rollNo.toLowerCase().includes(q)
        || s.email.toLowerCase().includes(q)
        || (s.phone||'').includes(q);
      const deptMatch = !dept || s.dept === dept;
      const yearMatch = !year || s.year === year;
      return nameMatch && deptMatch && yearMatch;
    });

    document.getElementById('resultsCount').textContent = `Showing ${filtered.length} of ${students.length} students`;

    const body = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');

    if (!filtered.length) {
      body.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    body.innerHTML = filtered.map((s, i) => `
      <tr>
        <td style="color:var(--muted);font-size:0.8rem">${i+1}</td>
        <td>
          <div style="font-weight:500">${s.firstName} ${s.lastName}</div>
          ${s.phone ? `<div style="font-size:0.78rem;color:var(--muted)">${s.phone}</div>` : ''}
        </td>
        <td style="font-family:'Syne',sans-serif;font-weight:600;color:var(--accent)">${s.rollNo}</td>
        <td><span class="badge badge-${s.dept.toLowerCase()}">${s.dept}</span></td>
        <td>Year ${s.year}${s.section ? ' / '+s.section : ''}</td>
        <td style="font-size:0.83rem;color:var(--muted)">${s.email}</td>
        <td style="font-family:'Syne',sans-serif;font-weight:600">${s.cgpa || '—'}</td>
        <td>
          <div class="action-btns">
            <button class="edit-btn" onclick="editStudent('${s.id}')">Edit</button>
            <button class="del-btn" onclick="deleteStudent('${s.id}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');

    // GA search event (debounced)
    if (q) gtag('event', 'search', { search_term: q, results_count: filtered.length });
  }

  /* ── Export CSV ── */
  function exportCSV() {
    if (!students.length) { showToast('No data to export!', '#ff4f6a'); return; }
    const headers = ['First Name','Last Name','Roll No','Email','Phone','DOB','Department','Year','Section','CGPA','Address','Registered At'];
    const rows = students.map(s => [
      s.firstName, s.lastName, s.rollNo, s.email, s.phone||'', s.dob||'',
      s.dept, s.year, s.section||'', s.cgpa||'', s.address||'',
      new Date(s.createdAt).toLocaleDateString()
    ]);
    const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
    a.download = 'students_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    gtag('event', 'export_csv', { count: students.length });
    showToast('📥 CSV downloaded!', '#4fffb0');
  }

  /* ── Toast ── */
  function showToast(msg, color = '#4fffb0') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = color;
    t.style.color = color === '#4fffb0' || color === '#00b4ff' ? '#0a0f1e' : '#fff';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  /* init */
  renderStats();
</script>
</body>
</html>
